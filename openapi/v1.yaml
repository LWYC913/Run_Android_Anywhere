        id:
          $ref: '#/components/schemas/WebhookId'
        project_id:
          $ref: '#/components/schemas/ProjectId'
        url:
          $ref: '#/components/schemas/Uri'
        events:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/WebhookEvent'
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    JobPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobSummary'
        next_cursor:
          type: string
          minLength: 1
    ArtifactPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        next_cursor:
          type: string
          minLength: 1
    WorkerPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkerStatus'
        next_cursor:
          type: string
          minLength: 1
    RuntimeProfilePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeProfile'
        next_cursor:
          type: string
          minLength: 1

    ApiError:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          minLength: 1
        request_id:
          $ref: '#/components/schemas/RequestId'
        details:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ApiError'

    WorkerRegistration:
      type: object
      required: [worker_id, runtimes, kvm, gpu, arch, capacity]
      properties:
        worker_id:
          $ref: '#/components/schemas/WorkerId'
        runtimes:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RuntimeKind'
        kvm:
          type: boolean
        gpu:
          type: boolean
        arch:
          $ref: '#/components/schemas/HostArch'
        capacity:
          type: integer
          format: int32
          minimum: 0
    WorkerHeartbeat:
      type: object
      required:
        - worker_id
        - active_jobs
        - capacity
        - runtimes
        - kvm
        - gpu
        - arch
        - lease_extends
        - last_seen
      properties:
        worker_id:
          $ref: '#/components/schemas/WorkerId'
        active_jobs:
          type: integer
          format: int32
          minimum: 0
        capacity:
          type: integer
          format: int32
          minimum: 0
        runtimes:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RuntimeKind'
        kvm:
          type: boolean
        gpu:
          type: boolean
        arch:
          $ref: '#/components/schemas/HostArch'
        lease_extends:
          type: array
          items:
            $ref: '#/components/schemas/JobLeaseExtension'
        last_seen:
          type: string
          format: date-time
    JobQueued:
      type: object
      required: [job_id, project_id, runtime_profile, min_isolation, timeout_seconds]
      properties:
        job_id:
          $ref: '#/components/schemas/JobId'
        project_id:
          $ref: '#/components/schemas/ProjectId'
        runtime_profile:
          $ref: '#/components/schemas/RuntimeProfile'
        min_isolation:
          $ref: '#/components/schemas/IsolationTier'
        timeout_seconds:
          $ref: '#/components/schemas/DurationSeconds'
    JobClaim:
      type: object
      required:
        - job_id
        - project_id
        - worker_id
        - lease_id
        - apk_upload_id
        - runtime_profile
        - mode
        - min_isolation
        - automation
        - artifacts
        - timeout_seconds
        - claimed_at
        - lease_expires_at
      properties:
        job_id:
          $ref: '#/components/schemas/JobId'
        project_id:
          $ref: '#/components/schemas/ProjectId'
        worker_id:
          $ref: '#/components/schemas/WorkerId'
        lease_id:
          $ref: '#/components/schemas/LeaseId'
        apk_upload_id:
          $ref: '#/components/schemas/UploadId'
        test_upload_id:
          $ref: '#/components/schemas/UploadId'
        runtime_profile:
          $ref: '#/components/schemas/RuntimeProfile'
        mode:
          $ref: '#/components/schemas/JobMode'
        min_isolation:
          $ref: '#/components/schemas/IsolationTier'
        automation:
          $ref: '#/components/schemas/AutomationSpec'
        artifacts:
          $ref: '#/components/schemas/ArtifactSelection'
        timeout_seconds:
          $ref: '#/components/schemas/DurationSeconds'
        claimed_at:
          type: string
          format: date-time
        lease_expires_at:
          type: string
          format: date-time
    JobLeaseExtension:
      type: object
      required: [job_id, lease_id]
      properties:
        job_id:
          $ref: '#/components/schemas/JobId'
        lease_id:
          $ref: '#/components/schemas/LeaseId'
    JobResult:
      type: object
      required:
        - job_id
        - worker_id
        - lease_id
        - outcome
        - artifact_ids
        - artifacts_finalized
        - cleanup_completed
        - completed_at
      properties:
        job_id:
          $ref: '#/components/schemas/JobId'
        worker_id:
          $ref: '#/components/schemas/WorkerId'
        lease_id:
          $ref: '#/components/schemas/LeaseId'
        outcome:
          $ref: '#/components/schemas/JobOutcome'
        artifact_ids:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ArtifactId'
        artifacts_finalized:
          type: boolean
        cleanup_completed:
          type: boolean
        error:
          $ref: '#/components/schemas/FailureDetail'
        completed_at:
          type: string
          format: date-time
